services:
  integration-postgres:
    image: postgres:16-alpine
    container_name: mc-integration-postgres
    ports:
      - "5433:5432"
    environment:
      POSTGRES_DB: mc_integration
      POSTGRES_USER: mc_integration
      POSTGRES_PASSWORD: mc_integration
    volumes:
      - integration_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mc_integration -d mc_integration"]
      interval: 5s
      timeout: 5s
      retries: 10

  middleware:
    build: ./middleware
    container_name: mc-middleware
    depends_on:
      integration-postgres:
        condition: service_healthy
    ports:
      - "8020:8020"
    environment:
      EVENT_STORE_DIR: /data
      EVENT_DATABASE_URL: ${EVENT_DATABASE_URL:-postgresql://mc_integration:mc_integration@integration-postgres:5432/mc_integration}
      WEBHOOK_SECRET: ${WEBHOOK_SECRET:-dev-webhook-secret}
    volumes:
      - ./data:/data

  mock-shopee-api:
    build: ./mock_shopee_api
    container_name: mc-mock-shopee-api
    depends_on:
      - middleware
    ports:
      - "8011:8011"
    environment:
      MIDDLEWARE_WEBHOOK_URL: http://middleware:8020/webhook/shopee
      WEBHOOK_SECRET: ${WEBHOOK_SECRET:-dev-webhook-secret}
      EVENT_INTERVAL_SECONDS: "2"
      REPLAY_INTERVAL_SECONDS: "0"

  mock-tiktok-api:
    build: ./mock_tiktok_api
    container_name: mc-mock-tiktok-api
    depends_on:
      - middleware
    ports:
      - "8012:8012"
    environment:
      MIDDLEWARE_WEBHOOK_URL: http://middleware:8020/webhook/tiktok
      WEBHOOK_SECRET: ${WEBHOOK_SECRET:-dev-webhook-secret}
      EVENT_INTERVAL_SECONDS: "2"
      REPLAY_INTERVAL_SECONDS: "0"

  odoo-ws-connector:
    build: ./odoo_ws_connector
    container_name: mc-odoo-ws-connector
    depends_on:
      - middleware
    ports:
      - "8030:8030"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      MIDDLEWARE_WS_URL: ws://middleware:8020/ws/odoo
      ODOO_URL: ${ODOO_URL:-http://host.docker.internal:8069}
      ODOO_DB: ${ODOO_DB:-Multi-Channel}
      ODOO_USERNAME: ${ODOO_USERNAME:-admin}
      ODOO_PASSWORD: ${ODOO_PASSWORD:-admin}
      DRY_RUN: ${DRY_RUN:-false}

volumes:
  integration_postgres_data:
